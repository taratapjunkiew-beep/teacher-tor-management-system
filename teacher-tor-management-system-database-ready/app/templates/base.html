<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_name }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="topbar">
  <div class="brand">{{ app_name }}</div>
  {% if user %}
  <nav>
    <a href="/dashboard">หน้าหลัก</a>
    <a href="/create">สร้างโครงการสอน</a>
    {% if user.role == "admin" %}
    <a href="/admin/courses">จัดการรายวิชา</a>
    <a href="/admin/pdf-import">นำเข้า PDF</a>
    <a href="/admin/import">นำเข้า CSV</a>
    <a href="/admin/users">ผู้ใช้</a>
    {% endif %}
    <a href="/logout">ออกจากระบบ</a>
  </nav>
  {% endif %}
</header>
<main class="container">{% block content %}{% endblock %}</main>
</body>
</html>
